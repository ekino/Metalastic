<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Metalastic Documentation - Type-safe metamodel generator for Elasticsearch in Kotlin">
    <title>Metalastic Documentation</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        #ComposeTarget {
            width: 100%;
            height: 100%;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6200EE;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="ComposeTarget">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading Metalastic Documentation...</div>
        </div>
    </canvas>
    <script src="metalastic-docs.js"></script>
</body>
</html>
